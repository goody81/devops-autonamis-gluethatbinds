name: BMAD Self-Dogfooding CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  planner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r agents/planner/requirements.txt
      - run: pytest agents/planner/tests

  executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - run: docker build -f ci/Dockerfile.runner -t bmad-runner:dev .
      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          config: tests/kind.yaml
      - run: helm install bmad-ci helm/bmad --wait
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go test -v ./agents/executor/...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign container image
        run: cosign sign --yes ghcr.io/bmad-protocol/bmad:${{ github.sha }}
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator@v2
        with:
          artifact-path: ghcr.io/bmad-protocol/bmad