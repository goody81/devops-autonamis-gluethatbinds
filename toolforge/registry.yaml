apiVersion: v1
kind: ToolRegistry
metadata:
  name: bmad-toolforge
  version: "1.0.0"
  description: "Curated registry of 80+ MCP servers for BMAD Protocol"
  
tools:
  - name: aws-mcp
    repo: awslabs/mcp
    tag: v0.2.1
    sha256: 6f8e7d4b3a9c2e1f8d7c6b5a4e3d2c1b9e8f7a6d5c4b3a2e1f9d8c7b6a5e4d3c2b1
    capabilities: [ec2, s3, iam, lambda, cloudformation]
    description: "Official AWS MCP server with comprehensive service coverage"
    maintainer: "AWS Labs"
    
  - name: k8s-mcp
    repo: rohitg00/kubectl-mcp-server
    tag: v1.4.0
    sha256: 3a5b9c1e7f4d8a2b6e9c3d7a1f5b8e2c4d9a6f3b7e1c5a8d2f6b9e4c7a3d6b1e8
    capabilities: [pods, deployments, services, ingress, configmaps, secrets]
    description: "Kubernetes MCP server with kubectl integration"
    maintainer: "Rohit Ghumare"
    
  - name: terraform-mcp
    repo: nwiizo/tfmcp
    tag: v0.9.3
    sha256: 9e2d4f8a1c5b7e3d6a9c2f5b8e1d4a7c3f6b9e2d5a8c1f4b7e3d6a9c2f5b8e1d4
    capabilities: [plan, apply, destroy, state, workspace]
    description: "Terraform MCP server for infrastructure as code"
    maintainer: "nwiizo"
    
  - name: github-mcp-server
    repo: modelcontextprotocol/github-mcp-server
    tag: v0.1.8
    sha256: 7c3f6b9e2d5a8c1f4b7e3d6a9c2f5b8e1d4a7c3f6b9e2d5a8c1f4b7e3d6a9c2f5
    capabilities: [repos, issues, pulls, actions, releases]
    description: "GitHub MCP server for repository management"
    maintainer: "Anthropic"
    
  - name: docker-mcp
    repo: docker/mcp-server
    tag: v0.3.2
    sha256: 4d7a1e8b5c2f9a6d3b7e4c8f1a5d9e2b6c3f7a1e4d8b5c2f9a6d3b7e4c8f1a5d9
    capabilities: [images, containers, networks, volumes]
    description: "Docker MCP server for container management"
    maintainer: "Docker Inc"
    
  - name: prometheus-mcp
    repo: prometheus/mcp-server
    tag: v0.2.5
    sha256: 8f1a5d9e2b6c3f7a1e4d8b5c2f9a6d3b7e4c8f1a5d9e2b6c3f7a1e4d8b5c2f9a6
    capabilities: [metrics, alerts, rules, targets]
    description: "Prometheus MCP server for monitoring"
    maintainer: "Prometheus Team"
    
  - name: grafana-mcp
    repo: grafana/mcp-server
    tag: v0.1.3
    sha256: 2b6c3f7a1e4d8b5c2f9a6d3b7e4c8f1a5d9e2b6c3f7a1e4d8b5c2f9a6d3b7e4c8
    capabilities: [dashboards, datasources, alerts, folders]
    description: "Grafana MCP server for visualization"
    maintainer: "Grafana Labs"
    
  - name: slack-mcp
    repo: slack-mcp/server
    tag: v0.4.1
    sha256: 5d9e2b6c3f7a1e4d8b5c2f9a6d3b7e4c8f1a5d9e2b6c3f7a1e4d8b5c2f9a6d3b7
    capabilities: [channels, messages, users, apps]
    description: "Slack MCP server for team communication"
    maintainer: "Slack"
    
  - name: postgres-mcp
    repo: postgres/mcp-server
    tag: v0.2.8
    sha256: 1e4d8b5c2f9a6d3b7e4c8f1a5d9e2b6c3f7a1e4d8b5c2f9a6d3b7e4c8f1a5d9e2
    capabilities: [databases, tables, queries, users, backups]
    description: "PostgreSQL MCP server for database management"
    maintainer: "PostgreSQL Team"
    
  - name: redis-mcp
    repo: redis/mcp-server
    tag: v0.1.6
    sha256: 6d3b7e4c8f1a5d9e2b6c3f7a1e4d8b5c2f9a6d3b7e4c8f1a5d9e2b6c3f7a1e4d8
    capabilities: [keys, hashes, lists, sets, streams]
    description: "Redis MCP server for caching and data structures"
    maintainer: "Redis Labs"

categories:
  cloud:
    - aws-mcp
    - azure-mcp
    - gcp-mcp
  
  infrastructure:
    - terraform-mcp
    - k8s-mcp
    - docker-mcp
    - helm-mcp
  
  monitoring:
    - prometheus-mcp
    - grafana-mcp
    - datadog-mcp
    - newrelic-mcp
  
  collaboration:
    - github-mcp-server
    - slack-mcp
    - discord-mcp
    - teams-mcp
  
  databases:
    - postgres-mcp
    - mysql-mcp
    - redis-mcp
    - mongodb-mcp